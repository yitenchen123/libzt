name: Build libzt (iOS)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-libzt:
    name: Build libzt for iOS (arm64)
    runs-on: macos-14

    steps:
      - name: Select Xcode 15.4
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
          xcodebuild -version

      - name: Install CMake
        run: brew install cmake

      - name: Checkout source (Your Fork)
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Create build directory
        run: mkdir -p build-ios

      - name: Configure CMake (iOS arm64, Service mode)
        working-directory: build-ios
        run: |
          cmake .. \
            -G "Xcode" \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_SHARED_LIB=OFF \
            -DBUILD_IOS_FRAMEWORK=ON \
            -DZTS_ENABLE_NETWORKNEEDS=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO \
            -DCMAKE_XCODE_ATTRIBUTE_ENABLE_BITCODE=NO \
            -DCMAKE_XCODE_ATTRIBUTE_IPHONEOS_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_C_FLAGS="-target arm64-apple-ios14.0" \
            -DCMAKE_CXX_FLAGS="-target arm64-apple-ios14.0 -stdlib=libc++"

      - name: Build libzt
        working-directory: build-ios
        run: |
          cmake --build . --config Release --parallel $(sysctl -n hw.ncpu)

      # ✨ 核心修复：无论 Xcode 把产物生成在哪个深层目录，都能找到并统一挪到 uploads 文件夹
      - name: Find and prepare libzt.a
        run: |
          echo "Searching for built library..."
          LIBZT_PATH=$(find build-ios -name "libzt.a" -type f | head -n 1)
          if [ -z "$LIBZT_PATH" ]; then
            echo "::error::libzt.a not found! Build step failed."
            exit 1
          fi
          echo "Found library at: $LIBZT_PATH"
          mkdir -p uploads
          cp "$LIBZT_PATH" uploads/libzt.a
          echo "Successfully prepared uploads/libzt.a"

      # ✨ 核心修复：明确指定统一的 uploads 文件夹
      - name: Upload libzt.a artifact
        uses: actions/upload-artifact@v4
        with:
          name: libzt-ios-arm64
          path: uploads/
          retention-days: 90